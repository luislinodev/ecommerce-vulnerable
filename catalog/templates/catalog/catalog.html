{% extends 'base.html' %}
{% load static %}

{% block title %}Catálogo{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'catalog/css/style.css' %}">
{% endblock %}

{% block content %}
<section class="info-section">
    <center>
        <h2 class="section-title">Catálogo</h2>
    </center>
    {% for product in products %}
    <div>
        <img src="{{ product.image_url }}" alt="{{ product.name }}">
        <h4>{{ product.name }}</h4>
        <p><strong>S/ {{ product.price }}</strong></p>
        <form action="{% url 'add_to_cart' product.id %}" method="post" style="margin-bottom: 5px;">
        {% csrf_token %}
        <button type="submit">Agregar al carrito</button>
      </form>

      <a href="{% url 'product_detail' product.slug %}">Detalles</a>

    </div>
    {% endfor %}
</section>
{% endblock %}
