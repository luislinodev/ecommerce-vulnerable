version: '3.9'

# Alternativa para desarrollo con hot-reload y debugging
# Usar con: docker-compose -f docker-compose.dev.yml up

services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce_db_dev
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: secure_password_123
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_web_dev
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - SQL_ENGINE=django.db.backends.postgresql
      - SQL_DATABASE=ecommerce_db
      - SQL_USER=ecommerce_user
      - SQL_PASSWORD=secure_password_123
      - SQL_HOST=db
      - SQL_PORT=5432
      - DJANGO_SECRET_KEY=django-insecure-dev-key
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,web
      - CORS_ALLOW_ALL_ORIGINS=True
    volumes:
      - .:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data

volumes:
  postgres_data_dev:
  redis_data_dev:
