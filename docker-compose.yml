version: "3.9"

services:
    db:
        image: postgres:16-alpine
        container_name: ecommerce_db

        environment:
            POSTGRES_DB: ${SQL_DATABASE:-ecommerce_db}
            POSTGRES_USER: ${SQL_USER:-ecommerce_user}
            POSTGRES_PASSWORD: ${SQL_PASSWORD:-secure_password_123}

        volumes:
            - postgres_data:/var/lib/postgresql/data

        ports:
            - "5432:5432"

        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${SQL_USER:-ecommerce_user} -d ${SQL_DATABASE:-ecommerce_db}"]
            interval: 10s
            timeout: 5s
            retries: 5

        networks:
            - ecommerce_network

    web:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: ecommerce_web
        command: sh -c "python manage.py migrate && gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 z_app_fle_pruebas.wsgi:application"
        environment:
            - SQL_ENGINE=django.db.backends.postgresql
            - SQL_DATABASE=${SQL_DATABASE:-ecommerce_db}
            - SQL_USER=${SQL_USER:-ecommerce_user}
            - SQL_PASSWORD=${SQL_PASSWORD:-secure_password_123}
            - SQL_HOST=db
            - SQL_PORT=5432
            - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-me-in-production}
            - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
            - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
            - CORS_ALLOW_ALL_ORIGINS=${CORS_ALLOW_ALL_ORIGINS:-True}
            - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
            - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
            - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
            - EMAIL_HOST=${EMAIL_HOST:-smtp.sendgrid.net}
            - EMAIL_PORT=${EMAIL_PORT:-587}
            - EMAIL_HOST_USER=${EMAIL_HOST_USER:-apikey}
            - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
        volumes:
            - .:/app
            - static_volume:/app/staticfiles
            - media_volume:/app/media
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy
        networks:
            - ecommerce_network

    redis:
        image: redis:7-alpine
        container_name: ecommerce_redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - ecommerce_network

volumes:
    postgres_data:
    static_volume:
    media_volume:
    redis_data:

networks:
    ecommerce_network:
        driver: bridge
